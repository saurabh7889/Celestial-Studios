<div id="nova-widget" class="fixed bottom-6 right-6 z-50 font-sans flex flex-col items-end" aria-live="polite">
  <style>
    @keyframes nova-welcome-appear {
      0% { opacity: 0; transform: translateY(16px) scale(0.95); pointer-events: none; }
      10% { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
      90% { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
      100% { opacity: 0; transform: translateY(8px) scale(0.95); pointer-events: none; }
    }
    @keyframes nova-typing {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }
    .nova-welcome-anim {
      animation: nova-welcome-appear 7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .nova-launcher-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nova-launcher-btn:hover {
      transform: scale(1.1) translateY(-4px);
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4), 0 8px 10px -6px rgba(37, 99, 235, 0.2);
      border-color: #2563eb;
    }
    .nova-typing-dot {
      animation: nova-typing 1.2s infinite ease-in-out;
    }
    .nova-typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .nova-typing-dot:nth-child(3) { animation-delay: 0.3s; }
  </style>

  <div id="nova-prompt-bubble"
    class="mb-3 mr-2 bg-white text-gray-800 pl-4 pr-2 py-3 rounded-[16px] shadow-[0_4px_20px_rgba(0,0,0,0.1)] border border-gray-100 flex items-center cursor-pointer nova-welcome-anim relative z-50 transition-opacity duration-300"
    role="button" tabindex="0" aria-label="Open chat with Nova">
    <div class="flex flex-col pr-2">
      <span class="text-[14px] font-bold text-[#2563eb] leading-tight mb-0.5">Hi, I'm Nova 👋</span>
      <span class="text-[13px] text-gray-600 leading-tight mt-1">How can I help grow your business today?</span>
    </div>
    <button id="nova-dismiss-prompt" type="button"
      class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-50 transition-colors focus:outline-none flex-shrink-0 self-start"
      aria-label="Dismiss prompt">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <div class="absolute -bottom-2 right-6 w-4 h-4 bg-white border-b border-r border-gray-100 transform rotate-45" aria-hidden="true"></div>
  </div>

  <button id="nova-launcher-btn" type="button"
    class="nova-launcher-btn flex items-center justify-center w-16 h-16 rounded-full bg-white shadow-2xl focus:outline-none overflow-hidden border-2 border-[#2563eb] scale-100 opacity-100 relative z-50"
    aria-label="Open Chat" aria-expanded="false" aria-controls="nova-chat-window">
    <img src="ASSET_PREFIXassets/images/celestial-ai.svg" alt="Chat with Nova" class="w-full h-full object-cover" width="64" height="64">
  </button>

  <div id="nova-chat-window"
    class="absolute bottom-0 right-0 w-[380px] max-w-[calc(100vw-3rem)] h-[600px] max-h-[calc(100vh-6rem)] bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden transition-all duration-300 transform origin-bottom-right scale-50 opacity-0 translate-y-10 pointer-events-none"
    role="dialog" aria-modal="true" aria-labelledby="nova-chat-title" hidden>
    <div class="bg-black text-white p-5 flex items-center justify-between shadow-md relative z-10">
      <div class="flex items-center space-x-3">
        <div class="relative">
          <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center border-2 border-gray-800 overflow-hidden">
            <img src="ASSET_PREFIXassets/images/celestial-ai.svg" alt="" class="w-full h-full object-cover" width="56" height="56">
          </div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-black rounded-full" aria-hidden="true"></div>
        </div>
        <div>
          <h3 id="nova-chat-title" class="font-bold text-[15px] leading-tight">Nova</h3>
          <p class="text-xs text-gray-400 font-medium">Celestial Studios AI</p>
        </div>
      </div>
      <button id="nova-close-btn" type="button"
        class="text-gray-400 hover:text-white transition-colors focus:outline-none p-1"
        aria-label="Close Chat">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div id="nova-messages" class="flex-1 overflow-y-auto p-5 bg-gray-50 space-y-4" tabindex="0"></div>

    <div class="p-4 bg-white border-t border-gray-100">
      <form id="nova-chat-form" class="flex items-center space-x-3">
        <label for="nova-chat-input" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">Ask Nova a question</label>
        <input id="nova-chat-input" type="text" placeholder="Ask a question..." autocomplete="off"
          class="flex-1 bg-gray-50 border border-gray-200 text-gray-800 rounded-full px-5 py-3 text-[15px] focus:outline-none focus:ring-2 focus:ring-[#57b1e3]/50 focus:border-[#57b1e3] transition-all">
        <button id="nova-send-btn" type="submit" disabled
          class="w-12 h-12 flex items-center justify-center rounded-full bg-black text-white hover:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex-shrink-0"
          aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90 translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
        </button>
      </form>
      <p id="nova-error" class="text-xs text-red-500 mt-2 hidden" role="alert"></p>
      <div class="text-center mt-3">
        <span class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">Powered by Nova AI</span>
      </div>
    </div>
  </div>
</div>
